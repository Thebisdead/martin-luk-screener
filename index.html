<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Martin Luk 美股筛选器</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;
  --border:#30363d;--text:#e6edf3;--muted:#8b949e;
  --green:#3fb950;--red:#f85149;--amber:#d29922;--blue:#388bfd;--purple:#bc8cff;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* header */
header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.logo h1{font-size:16px;font-weight:600}
.logo p{font-size:11px;color:var(--muted);margin-top:2px}
.hdr-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.last-upd{font-size:11px;color:var(--muted)}

/* buttons */
.btn{padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{border-color:var(--blue)}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.primary:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.sm{padding:4px 10px;font-size:12px}

/* progress */
.prog-bar{height:2px;background:var(--border)}
.prog-fill{height:2px;background:var(--blue);transition:width .4s;width:0}

/* phase tabs */
.phase-bar{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 24px}
.phase-tab{padding:10px 20px;font-size:13px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.phase-tab.active{color:var(--text);border-bottom-color:var(--blue);font-weight:500}

/* panels */
.panel{display:none}.panel.active{display:block}

/* sector grid */
.sector-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;padding:20px 24px}
.sec-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.sec-card:hover{border-color:var(--blue);transform:translateY(-1px)}
.sec-card.rank-1{border-color:#f1c40f55}.sec-card.rank-2{border-color:#ced4da55}.sec-card.rank-3{border-color:#cd7f3255}
.heat-tag{position:absolute;top:10px;right:10px;font-size:10px;padding:2px 7px;border-radius:999px;font-weight:500}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-name{font-size:14px;font-weight:600}
.card-sub{font-size:10px;color:var(--muted);margin-top:2px}
.heat-num{font-size:28px;font-weight:800;line-height:1}
.heat-lbl{font-size:10px;color:var(--muted);text-align:right}
.hbar-bg{height:4px;background:var(--bg3);border-radius:2px;margin:8px 0}
.hbar-fill{height:4px;border-radius:2px;transition:width .6s}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.met{background:var(--bg3);border-radius:5px;padding:5px 8px}
.met-l{font-size:10px;color:var(--muted);margin-bottom:1px}
.met-v{font-size:12px;font-weight:600}
.top-movers{margin-bottom:10px}
.mover-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--bg3);font-size:11px}
.mover-row:last-child{border:none}
.mover-ticker{font-weight:600;color:var(--text)}
.mover-meta{color:var(--muted)}
.drill-btn{width:100%;padding:6px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:12px;cursor:pointer;transition:all .15s}
.drill-btn:hover{background:var(--blue);border-color:var(--blue);color:#fff}

/* screener */
.toolbar{display:flex;gap:8px;padding:12px 24px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border)}
.toolbar label{font-size:12px;color:var(--muted)}
select{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 10px;font-size:13px;cursor:pointer}
.range-grp{display:flex;align-items:center;gap:6px}
input[type=range]{width:80px;accent-color:var(--blue);cursor:pointer}

.stats-row{display:flex;gap:10px;padding:12px 24px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 14px}
.stat .sl{font-size:11px;color:var(--muted);margin-bottom:2px}
.stat .sv{font-size:20px;font-weight:700}

.breadcrumb{padding:9px 24px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;border-bottom:1px solid var(--border)}
.breadcrumb a{color:var(--blue);cursor:pointer;text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}

/* scan progress */
.scan-info{padding:8px 24px;font-size:12px;color:var(--muted);background:var(--bg2);border-bottom:1px solid var(--border);display:none}
.scan-info.visible{display:flex;align-items:center;gap:10px}

/* table */
.tbl-wrap{overflow-x:auto;padding-bottom:60px}
table{width:100%;border-collapse:collapse;min-width:820px}
thead th{position:sticky;top:0;z-index:10;background:var(--bg);padding:9px 14px;text-align:left;font-size:11px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none}
thead th:hover{color:var(--text)}
tbody tr{border-bottom:1px solid var(--bg2);transition:background .1s}
tbody tr:hover{background:var(--bg2)}
td{padding:9px 14px;vertical-align:middle}
.ticker-sym{font-size:14px;font-weight:700}
.ticker-sym a{color:var(--text);text-decoration:none}
.ticker-sym a:hover{color:var(--blue)}
.ticker-sec{font-size:10px;color:var(--muted);margin-top:1px}
.score-wrap{display:flex;align-items:center;gap:8px;min-width:90px}
.score-num{font-size:15px;font-weight:700;min-width:26px}
.sbar-bg{flex:1;height:3px;background:var(--bg3);border-radius:2px}
.sbar-fill{height:3px;border-radius:2px}
.up{color:var(--green)}.dn{color:var(--red)}.neu{color:var(--muted)}
.chips{display:flex;flex-wrap:wrap;gap:3px}
.chip{font-size:10px;padding:1px 5px;border-radius:3px;white-space:nowrap}
.chip.pass{background:rgba(63,185,80,.12);color:var(--green);border:1px solid rgba(63,185,80,.25)}
.chip.fail{background:rgba(248,81,73,.10);color:var(--red);border:1px solid rgba(248,81,73,.20)}

.loading{text-align:center;padding:60px 24px;color:var(--muted)}
.spinner{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 24px;color:var(--muted);font-size:15px}

/* sector filter pills in screener */
.sec-pills{display:flex;gap:5px;padding:10px 24px;flex-wrap:wrap;border-bottom:1px solid var(--border);overflow-x:auto}
.pill{padding:4px 12px;border-radius:999px;border:1px solid var(--border);font-size:12px;cursor:pointer;color:var(--muted);background:transparent;white-space:nowrap;transition:all .15s}
.pill:hover{color:var(--text)}
.pill.active{background:var(--bg3);border-color:var(--blue);color:var(--text);font-weight:500}

@media(max-width:600px){header,.stats-row,.toolbar,.breadcrumb,.scan-info,.sec-pills{padding-left:16px;padding-right:16px}.sector-grid{padding:14px 16px}td,thead th{padding:8px 10px}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>📈 Martin Luk 美股筛选器</h1>
    <p>实时板块热度 · EMA 9/21/50 · AVWAP支撑 · 2000+ 只美股</p>
  </div>
  <div class="hdr-right">
    <span class="last-upd" id="last-upd"></span>
    <button class="btn primary" id="main-btn" onclick="mainAction()">🔥 扫描所有板块热度</button>
  </div>
</header>

<div class="prog-bar"><div class="prog-fill" id="prog"></div></div>

<div class="phase-bar">
  <div class="phase-tab active" id="tab-sectors" onclick="showPanel('sectors')">🔥 板块热度排行</div>
  <div class="phase-tab"        id="tab-stocks"  onclick="showPanel('stocks')">📊 个股筛选</div>
</div>

<!-- ══════════════ PANEL 1: Sector Heatmap ══════════════ -->
<div class="panel active" id="panel-sectors">
  <div id="sec-content">
    <div class="empty" style="padding:80px 24px">
      点击「扫描所有板块热度」获取实时排行<br>
      <span style="font-size:12px;margin-top:8px;display:block;color:var(--muted)">覆盖 16 个板块 · 2000+ 只美股 · 约需 5 秒</span>
    </div>
  </div>
</div>

<!-- ══════════════ PANEL 2: Stock Screener ══════════════ -->
<div class="panel" id="panel-stocks">
  <div class="breadcrumb">
    <a onclick="showPanel('sectors')">← 板块热度</a> /
    <span id="crumb-label">全部板块</span>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="sl">通过筛选</div><div class="sv" id="cnt-pass">—</div></div>
    <div class="stat"><div class="sl">EMA多头</div><div class="sv" id="cnt-ema">—</div></div>
    <div class="stat"><div class="sl">AVWAP支撑</div><div class="sv" id="cnt-avwap">—</div></div>
    <div class="stat"><div class="sl">整理形态</div><div class="sv" id="cnt-consol">—</div></div>
    <div class="stat"><div class="sl">扫描股票数</div><div class="sv" id="cnt-total">—</div></div>
  </div>

  <div class="sec-pills" id="sec-pills"></div>

  <div class="toolbar">
    <label>排序</label>
    <select id="sort-sel" onchange="renderTable()">
      <option value="score">评分</option>
      <option value="adr">ADR%</option>
      <option value="volSurge">量能倍数</option>
      <option value="chg1mo">月涨幅</option>
      <option value="chg1d">今日%</option>
    </select>
    <label>最低评分</label>
    <div class="range-grp">
      <input type="range" id="score-min" min="0" max="100" value="30" step="5"
             oninput="document.getElementById('score-lbl').textContent=this.value;renderTable()">
      <span id="score-lbl" style="font-size:12px;min-width:22px">30</span>
    </div>
    <label>条件过滤</label>
    <select id="setup-sel" onchange="renderTable()">
      <option value="all">全部</option>
      <option value="bull">EMA多头排列</option>
      <option value="avwap">AVWAP支撑</option>
      <option value="consol">整理形态</option>
      <option value="weekly">周线向上</option>
    </select>
    <button class="btn sm" id="rescan-btn" style="margin-left:auto" onclick="scanStocks(activeSector)">↺ 重新扫描</button>
  </div>

  <div class="scan-info" id="scan-info">
    <div class="spinner" style="width:16px;height:16px;border-width:2px;flex-shrink:0"></div>
    <span id="scan-msg">正在扫描...</span>
  </div>

  <div class="tbl-wrap">
    <div id="stock-content"><div class="empty">请先从板块热度页面选择板块，或点击「扫描全部」</div></div>
  </div>
</div>

<script>
/* ═══════════════════════ STATE ═══════════════════════ */
let sectorData  = [];
let stockData   = [];
let activeSector = null;
let activeSecPill = 'all';
let scanning    = false;
let sortKey     = 'score';
let sortAsc     = false;

/* ═══════════════════════ PANELS ══════════════════════ */
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.phase-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.getElementById('tab-'   + name).classList.add('active');
  const btn = document.getElementById('main-btn');
  if (name === 'sectors') {
    btn.textContent = sectorData.length ? '↺ 重新扫描板块' : '🔥 扫描所有板块热度';
    btn.onclick = scanSectors;
  } else {
    btn.textContent = '📊 扫描全部 2000+ 股';
    btn.onclick = () => scanStocks(null);
  }
}

function mainAction() {
  const onSectors = document.getElementById('panel-sectors').classList.contains('active');
  if (onSectors) scanSectors(); else scanStocks(activeSector);
}

/* ═══════════════════════ PROGRESS ════════════════════ */
function setProgress(pct) {
  document.getElementById('prog').style.width = pct + '%';
  if (pct >= 100) setTimeout(() => setProgress(0), 800);
}

function setLastUpdate(iso) {
  const d = new Date(iso);
  document.getElementById('last-upd').textContent =
    `更新 ${d.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'})}`;
}

/* ═══════════════════════ PHASE 1 — SECTORS ═══════════ */
async function scanSectors() {
  if (scanning) return;
  scanning = true;
  const btn = document.getElementById('main-btn');
  btn.disabled = true; btn.textContent = '⏳ 扫描中...';
  setProgress(15);

  document.getElementById('sec-content').innerHTML =
    `<div class="loading"><div class="spinner"></div>
     <div>正在获取所有板块实时热度...</div>
     <div style="font-size:12px;margin-top:6px;color:var(--muted)">16 个板块 · 批量 API 约 5 秒</div></div>`;

  try {
    setProgress(40);
    const r    = await fetch('/api/sectors');
    setProgress(90);
    const json = await r.json();
    sectorData  = json.data ?? [];
    setLastUpdate(json.updatedAt);
    document.getElementById('last-upd').textContent +=
      ` · 已抓取 ${json.totalQuotes ?? '—'} 只报价`;
    setProgress(100);
    renderSectors();
  } catch(e) {
    document.getElementById('sec-content').innerHTML =
      `<div class="empty">⚠️ 获取失败：${e.message}</div>`;
    setProgress(0);
  }
  scanning = false;
  btn.disabled = false;
  btn.textContent = '↺ 重新扫描板块';
  btn.onclick = scanSectors;
}

const heatColor = h => h >= 75 ? '#f85149' : h >= 55 ? '#d29922' : h >= 35 ? '#388bfd' : '#8b949e';
const heatLabel = h => h >= 75 ? '🔥 超热' : h >= 55 ? '🌡 热门' : h >= 35 ? '💧 温和' : '❄ 清淡';

function renderSectors() {
  if (!sectorData.length) {
    document.getElementById('sec-content').innerHTML = '<div class="empty">无数据</div>';
    return;
  }

  const html = sectorData.map((s, i) => {
    const col   = heatColor(s.heat);
    const chgC  = s.avgChg > 0 ? 'up' : s.avgChg < 0 ? 'dn' : 'neu';
    const movers = (s.topMovers ?? []).map(m => {
      const mc = m.chg > 0 ? 'up' : m.chg < 0 ? 'dn' : 'neu';
      return `<div class="mover-row">
        <span class="mover-ticker">${m.ticker}</span>
        <span class="mover-meta">
          <span class="${mc}">${m.chg > 0 ? '+' : ''}${m.chg}%</span>
          &nbsp;·&nbsp; ×${m.volRatio}
        </span>
      </div>`;
    }).join('');

    return `<div class="sec-card ${i < 3 ? 'rank-'+(i+1) : ''}">
      <span class="heat-tag" style="background:${col}22;color:${col}">${heatLabel(s.heat)}</span>
      <div class="card-top">
        <div>
          <div class="card-name">${s.sector}</div>
          <div class="card-sub">${s.tickerCount} 只样本股</div>
        </div>
        <div style="text-align:right">
          <div class="heat-num" style="color:${col}">${s.heat}</div>
          <div class="heat-lbl">热度分</div>
        </div>
      </div>
      <div class="hbar-bg"><div class="hbar-fill" style="width:${s.heat}%;background:${col}"></div></div>
      <div class="metrics">
        <div class="met"><div class="met-l">今日均涨</div><div class="met-v ${chgC}">${s.avgChg > 0 ? '+' : ''}${s.avgChg}%</div></div>
        <div class="met"><div class="met-l">量能倍数</div><div class="met-v">×${s.avgVolRatio.toFixed(1)}</div></div>
        <div class="met"><div class="met-l">上涨占比</div><div class="met-v">${s.breadth}%</div></div>
        <div class="met"><div class="met-l">近52高</div><div class="met-v">${s.nearHighPct}%</div></div>
      </div>
      ${movers ? `<div class="top-movers" style="margin-bottom:8px">
        <div style="font-size:10px;color:var(--muted);margin-bottom:4px">今日最大波动</div>
        ${movers}
      </div>` : ''}
      <button class="drill-btn" onclick="drillInto('${s.sector}')">进入板块 → 筛选个股</button>
    </div>`;
  }).join('');

  document.getElementById('sec-content').innerHTML =
    `<div class="sector-grid">${html}</div>
     <div style="padding:0 24px 20px;font-size:11px;color:var(--muted)">
       热度算法：量能倍数(35%) + 上涨占比(20%) + 均涨幅(20%) + 近52高占比(15%) + ADR(10%)
     </div>`;
}

/* ═══════════════════════ PHASE 2 — STOCKS ════════════ */
async function drillInto(sector) {
  activeSector = sector;
  showPanel('stocks');
  await scanStocks(sector);
}

async function scanStocks(sector) {
  if (scanning) return;
  scanning = true;
  activeSector = sector ?? null;

  const rescanBtn = document.getElementById('rescan-btn');
  const mainBtn   = document.getElementById('main-btn');
  rescanBtn.disabled = mainBtn.disabled = true;
  mainBtn.textContent = '⏳ 扫描中...';

  const label = sector ?? '全部 2000+ 只';
  document.getElementById('crumb-label').textContent = label;
  document.getElementById('scan-info').classList.add('visible');
  document.getElementById('scan-msg').textContent =
    sector ? `正在扫描「${sector}」板块个股...` : '正在扫描全部 2000+ 只股票（约 45–60 秒）...';

  setProgress(10);
  document.getElementById('stock-content').innerHTML =
    `<div class="loading"><div class="spinner"></div>
     <div>正在获取 ${sector ? '「'+sector+'」' : '全部'} 个股实时数据...</div>
     <div style="font-size:12px;margin-top:6px;color:var(--muted)">
       ${sector ? '计算 EMA / AVWAP / 量能' : '2000+ 只股票 · 并发扫描 · 约需 45–60 秒'}
     </div></div>`;

  try {
    setProgress(30);
    const qs   = sector ? `?sector=${encodeURIComponent(sector)}` : '';
    const r    = await fetch('/api/screen' + qs);
    setProgress(90);
    const json = await r.json();
    stockData  = json.data ?? [];
    setLastUpdate(json.updatedAt);
    document.getElementById('cnt-total').textContent = json.total ?? '—';
    setProgress(100);
    buildSecPills();
    renderTable();
  } catch(e) {
    document.getElementById('stock-content').innerHTML =
      `<div class="empty">⚠️ 获取失败：${e.message}</div>`;
    setProgress(0);
  }

  scanning = false;
  document.getElementById('scan-info').classList.remove('visible');
  rescanBtn.disabled = mainBtn.disabled = false;
  mainBtn.textContent = activeSector ? '↺ 重新扫描' : '📊 扫描全部 2000+ 股';
}

/* ─── Sector pills (within screener panel) ──────────── */
function buildSecPills() {
  const sectors = ['全部', ...new Set(stockData.map(d => d.sector))].sort();
  const pills = document.getElementById('sec-pills');
  pills.innerHTML = sectors.map(s => {
    const v = s === '全部' ? 'all' : s;
    return `<button class="pill ${activeSecPill === v ? 'active' : ''}"
      onclick="setSecPill('${v}')">${s}</button>`;
  }).join('');
}

function setSecPill(v) {
  activeSecPill = v;
  buildSecPills();
  renderTable();
}

/* ─── Table render ──────────────────────────────────── */
const scoreColor = s => s >= 80 ? '#3fb950' : s >= 60 ? '#d29922' : '#8b949e';
const chip = (pass, lbl) => `<span class="chip ${pass ? 'pass' : 'fail'}">${lbl}</span>`;

function sortBy(k) {
  if (sortKey === k) sortAsc = !sortAsc; else { sortKey = k; sortAsc = false; }
  renderTable();
}

function renderTable() {
  const scoreMin = +document.getElementById('score-min').value;
  const setup    = document.getElementById('setup-sel').value;
  sortKey        = document.getElementById('sort-sel').value;

  let list = stockData.filter(d => {
    if (activeSecPill !== 'all' && d.sector !== activeSecPill) return false;
    if (d.score < scoreMin) return false;
    if (setup === 'bull'   && !d.emaBull)         return false;
    if (setup === 'avwap'  && !d.avwapSupport)    return false;
    if (setup === 'consol' && !d.isConsolidating) return false;
    if (setup === 'weekly' && !d.weeklyUp)        return false;
    return true;
  }).sort((a, b) => sortAsc ? a[sortKey] - b[sortKey] : b[sortKey] - a[sortKey]);

  document.getElementById('cnt-pass').textContent  = list.length;
  document.getElementById('cnt-ema').textContent   = list.filter(d => d.emaBull).length;
  document.getElementById('cnt-avwap').textContent = list.filter(d => d.avwapSupport).length;
  document.getElementById('cnt-consol').textContent= list.filter(d => d.isConsolidating).length;

  if (!list.length) {
    document.getElementById('stock-content').innerHTML =
      '<div class="empty">没有符合条件的股票，试试降低最低评分</div>';
    return;
  }

  document.getElementById('stock-content').innerHTML = `
  <table>
    <thead><tr>
      <th onclick="sortBy('ticker')">股票 ↕</th>
      <th onclick="sortBy('score')">评分 ↕</th>
      <th onclick="sortBy('price')">价格 ↕</th>
      <th onclick="sortBy('chg1d')">今日% ↕</th>
      <th onclick="sortBy('chg1mo')">月涨幅 ↕</th>
      <th onclick="sortBy('adr')">ADR% ↕</th>
      <th onclick="sortBy('volSurge')">量能倍数 ↕</th>
      <th>EMA均线</th>
      <th>条件</th>
    </tr></thead>
    <tbody>${list.map(d => {
      const sc  = d.score, col = scoreColor(sc);
      const c1d = d.chg1d  > 0 ? 'up' : d.chg1d  < 0 ? 'dn' : 'neu';
      const c1m = d.chg1mo > 0 ? 'up' : d.chg1mo < 0 ? 'dn' : 'neu';
      const tv  = `https://www.tradingview.com/chart/?symbol=${d.ticker}`;
      return `<tr>
        <td>
          <div class="ticker-sym"><a href="${tv}" target="_blank">${d.ticker}</a></div>
          <div class="ticker-sec">${d.sector}</div>
        </td>
        <td>
          <div class="score-wrap">
            <span class="score-num" style="color:${col}">${sc}</span>
            <div class="sbar-bg"><div class="sbar-fill" style="width:${sc}%;background:${col}"></div></div>
          </div>
        </td>
        <td>$${d.price.toFixed(2)}</td>
        <td class="${c1d}">${d.chg1d > 0 ? '+' : ''}${d.chg1d.toFixed(2)}%</td>
        <td class="${c1m}">${d.chg1mo > 0 ? '+' : ''}${d.chg1mo.toFixed(1)}%</td>
        <td>${d.adr.toFixed(1)}%</td>
        <td>×${d.volSurge.toFixed(1)}</td>
        <td>
          <span style="font-size:11px;color:${d.emaBull ? 'var(--green)' : 'var(--red)'}">
            ${d.emaBull ? '9>21>50 ✓' : '未排列'}
          </span><br>
          <span style="font-size:10px;color:var(--muted)">
            9:${d.ema9.toFixed(1)} · 21:${d.ema21.toFixed(1)} · 50:${d.ema50.toFixed(1)}
          </span>
        </td>
        <td>
          <div class="chips">
            ${chip(d.emaBull,         'EMA多头')}
            ${chip(d.avwapSupport,    'AVWAP支撑')}
            ${chip(d.weeklyUp,        '周线↑')}
            ${chip(d.isConsolidating, '整理')}
            ${chip(d.volSurge >= 1.8, `量×${d.volSurge.toFixed(1)}`)}
          </div>
        </td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}
</script>
</body>
</html>
